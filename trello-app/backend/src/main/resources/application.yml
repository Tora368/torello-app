spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/trello}
    username: ${DB_USER:trello}
    password: ${DB_PASS:trello}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    com.example.trello: DEBUG
