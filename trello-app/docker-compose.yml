services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trello}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trello}
      POSTGRES_DB: ${POSTGRES_DB:-trello}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - trello_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trello} -d ${POSTGRES_DB:-trello}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-trello}
      DB_USER: ${POSTGRES_USER:-trello}
      DB_PASS: ${POSTGRES_PASSWORD:-trello}
    depends_on:
      db:
        condition: service_healthy

volumes:
  trello_pgdata:
