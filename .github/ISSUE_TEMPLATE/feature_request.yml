name: Feature Request
description: 新機能の追加を提案する
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        **作業を開始する前にすべての項目を記入してください。**
        このイシューから作成されたブランチ (`feature/issue-{N}-description`) でのみ作業を行うこと。

  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: 何を作りたいか、なぜ必要かを説明してください。
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: 完了条件
      description: |
        この機能が完成したと言える条件をチェックリスト形式で記載してください。
        例:
        - [ ] ログインページが表示される
        - [ ] 認証成功後にダッシュボードへリダイレクトされる
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: 対象領域
      options:
        - Frontend
        - Backend
        - Infrastructure
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 補足・参考情報
      description: 関連するデザイン、仕様書、参考リンクなど（任意）
    validations:
      required: false
